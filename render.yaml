services:
  - type: web
    name: smartexpense
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartexpense-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production

databases:
  - name: smartexpense-db
    databaseName: smartexpense
    user: smartexpense
    plan: free
