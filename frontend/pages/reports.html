<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartExpense — Relatórios</title>
  <link rel="stylesheet" href="../css/global.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="grain" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter>
      <rect width="100%" height="100%" filter="url(#g)"/>
    </svg>
  </div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="white" aria-hidden="true"><rect x="2" y="12" width="5" height="10" rx="1"/><rect x="9.5" y="6" width="5" height="16" rx="1"/><rect x="17" y="2" width="5" height="20" rx="1"/></svg></div>
        <span class="logo-text">SmartExpense</span>
      </div>
      <span class="nav-label">Menu</span>
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span> Dashboard</a>
      <a href="income.html"    class="nav-item" data-page="income"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span> Receitas</a>
      <a href="expenses.html"  class="nav-item" data-page="expenses"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg></span> Despesas</a>
      <a href="reports.html"   class="nav-item active" data-page="reports"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span> Relatórios</a>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sair</button>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger-btn" id="hamburger" aria-label="Menu">☰</button>
          <span class="topbar-title">Relatórios</span>
        </div>
        <div class="topbar-right">
          <div class="user-badge">
            <div class="user-avatar" id="userAvatar">U</div>
            <span class="user-name" id="userName">Usuário</span>
          </div>
        </div>
      </header>

      <main class="content">
        <div class="page-header animate">
          <h1>Relatórios</h1>
          <p>Análise detalhada das suas finanças</p>
        </div>

        <!-- Filtro por período (para gráfico de categorias) -->
        <div class="card animate" style="margin-bottom:18px;">
          <div class="filter-bar">
            <div class="form-group">
              <label class="form-label">Período — início</label>
              <input type="date" id="filterStart" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Período — fim</label>
              <input type="date" id="filterEnd" class="form-control">
            </div>
            <button class="btn btn-primary" onclick="loadReports()">Atualizar</button>
          </div>
        </div>

        <!-- Pizza + tabela de categorias -->
        <div class="bento-grid grid-2" style="margin-bottom:20px;">
          <div class="card animate">
            <div class="card-header">
              <span class="card-title">Gastos por Categoria</span>
            </div>
            <div class="chart-area-lg">
              <canvas id="chartPie"></canvas>
            </div>
          </div>
          <div class="card animate">
            <div class="card-header">
              <span class="card-title">Detalhamento por Categoria</span>
            </div>
            <div id="categoryTable">
              <div class="loading-overlay"><div class="spinner"></div></div>
            </div>
          </div>
        </div>

        <!-- Barras — receitas x despesas mensais -->
        <div class="card animate" style="margin-bottom:20px;">
          <div class="card-header">
            <span class="card-title">Receitas × Despesas por Mês</span>
          </div>
          <div class="chart-area-xl">
            <canvas id="chartBar"></canvas>
          </div>
        </div>

        <!-- Linha — saldo mensal -->
        <div class="card animate">
          <div class="card-header">
            <span class="card-title">Evolução do Saldo Mensal</span>
          </div>
          <div class="chart-area-lg">
            <canvas id="chartLine"></canvas>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/reports.js"></script>
  <script>
    if (!requireAuth()) {}
    initSidebar();
    initScrollAnimations();
    loadReports();
  </script>
</body>
</html>
